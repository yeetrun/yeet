[tools]
go = "1.26.4"
rust = "stable"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
golangci-lint = "2.12.2"
pre-commit = "latest"
staticcheck = "latest"

[tasks.init-host]
description = "Install yeet/catch on a host via yeet init"
usage = '''
arg "host" help="user@host for the catch install (e.g. root@box)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

go run ./cmd/yeet init "${usage_host?}"
'''

[tasks.install-githooks]
description = "Install git hooks via pre-commit"
run = '''
#!/usr/bin/env bash
set -euo pipefail

git config --local --unset-all core.hooksPath || true

pre-commit install --install-hooks \
  --hook-type pre-commit \
  --hook-type prepare-commit-msg
'''

[tasks.test]
description = "Run the Go test suite"
run = "go test ./..."

[tasks."guest:init:test"]
description = "Run yeet-init Rust tests"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [[ "$(uname -s)" == "Darwin" ]] && command -v xcrun >/dev/null 2>&1; then
  case "$(rustc -vV | awk '/^host:/ {print $2}')" in
    aarch64-apple-darwin)
      export CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER="$(xcrun --find cc)"
      ;;
    x86_64-apple-darwin)
      export CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER="$(xcrun --find cc)"
      ;;
  esac
fi

cargo test --locked --manifest-path guest/yeet-init/Cargo.toml
'''

[tasks."guest:init:build"]
description = "Build static yeet-init for the VM image"
run = '''
#!/usr/bin/env bash
set -euo pipefail

rustup target add x86_64-unknown-linux-musl
export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER="${CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER:-rust-lld}"
cargo build --locked --manifest-path guest/yeet-init/Cargo.toml --release --target x86_64-unknown-linux-musl

binary=guest/yeet-init/target/x86_64-unknown-linux-musl/release/yeet-init
file_output=$(file "$binary")
echo "$file_output"
if [[ "$file_output" != *"ELF 64-bit"* || "$file_output" != *"x86-64"* ]]; then
  echo "expected x86-64 ELF binary: $file_output" >&2
  exit 1
fi
if [[ "$file_output" == *"dynamically linked"* ]]; then
  echo "expected static binary without dynamic interpreter: $file_output" >&2
  exit 1
fi
'''

[tasks."guest:agent:test"]
description = "Run yeet-agent Rust tests"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [[ "$(uname -s)" == "Darwin" ]] && command -v xcrun >/dev/null 2>&1; then
  case "$(rustc -vV | awk '/^host:/ {print $2}')" in
    aarch64-apple-darwin)
      export CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER="$(xcrun --find cc)"
      ;;
    x86_64-apple-darwin)
      export CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER="$(xcrun --find cc)"
      ;;
  esac
fi

cargo test --locked --manifest-path guest/yeet-agent/Cargo.toml
'''

[tasks."guest:agent:build"]
description = "Build static yeet-agent for the VM image"
run = '''
#!/usr/bin/env bash
set -euo pipefail

rustup target add x86_64-unknown-linux-musl
export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER="${CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER:-rust-lld}"
cargo build --locked --manifest-path guest/yeet-agent/Cargo.toml --release --target x86_64-unknown-linux-musl

binary=guest/yeet-agent/target/x86_64-unknown-linux-musl/release/yeet-agent
file_output=$(file "$binary")
echo "$file_output"
if [[ "$file_output" != *"ELF 64-bit"* || "$file_output" != *"x86-64"* ]]; then
  echo "expected x86-64 ELF binary: $file_output" >&2
  exit 1
fi
if [[ "$file_output" == *"dynamically linked"* ]]; then
  echo "expected static binary without dynamic interpreter: $file_output" >&2
  exit 1
fi
'''

[tasks.coverage]
description = "Run tests and write the quality coverage profile"
run = '''
#!/usr/bin/env bash
set -euo pipefail

mkdir -p .tmp/quality
go test -coverprofile=.tmp/quality/coverage.out -covermode=atomic ./...
go tool cover -func=.tmp/quality/coverage.out | tee .tmp/quality/coverage.txt
'''

[tasks.quality]
description = "Run tests, coverage, CRAP, and lint quality gates"
run = "tools/quality/check"

[tasks.race]
description = "Run the Go test suite with the race detector"
run = "tools/quality/race"

[tasks.fuzz]
description = "Run active Go fuzz targets for a bounded time"
run = "tools/quality/fuzz"

[tasks.mutation]
description = "Run bounded mutation testing targets"
run = "tools/quality/mutation"

[tasks."mutation:baseline"]
description = "Refresh the bounded mutation testing baseline"
run = "tools/quality/mutation --update-baseline"

[tasks.hotspots]
description = "Rank code-quality hotspots by churn, coverage, CRAP, and lint signals"
run = "go run ./tools/hotspots -write"

[tasks.vuln]
description = "Run the Go vulnerability scanner"
run = "govulncheck ./..."

[tasks."quality:goal"]
description = "Run the heavy industry-standard quality goal check"
run = "tools/quality/goal"

[tasks."quality:baseline"]
description = "Refresh the current CRAP and lint baselines"
run = "tools/quality/check --update-baseline"
